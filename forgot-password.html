<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Forgot password — DEV-VAULT DATA" />
  <title>Forgot Password — DEV-VAULT DATA</title>
  <link rel="stylesheet" href="css/styles.css" />
  <script defer src="js/env.js"></script>
  <script defer src="js/auth.js"></script>
  <script defer src="js/main.js"></script>
</head>
<body>
  <div class="bg-grid" aria-hidden="true"></div>

  <header class="topbar glass">
    <div class="container topbar__row">
      <a class="brand" href="index.html">
        <span class="brand__mark">DV</span>
        <span class="brand__name">DEV-VAULT DATA</span>
      </a>
      <button id="themeToggle" class="iconbtn" type="button" aria-label="Toggle theme">
        <span class="iconbtn__icon" aria-hidden="true">☾</span>
      </button>
    </div>
  </header>

  <main class="authPage">
    <div class="container authGrid">
      <section class="authHero glass" aria-hidden="true">
        <div class="pill pill--invert"><span class="pill__dot"></span> Password recovery</div>
        <h1 class="authTitle">Forgot your password?</h1>
        <p class="authText">Enter your email to receive a password reset link. Session remains secure.</p>
      </section>

      <section class="authCard glass">
        <form id="forgotForm" class="form" autocomplete="on">
          <h2 class="formTitle">Reset Password</h2>

          <label class="field">
            <span>Email</span>
            <input name="email" type="email" placeholder="you@example.com" required />
          </label>

          <button id="forgotBtn" class="btn btn--primary" type="submit">
            <span class="btn__text">Send Reset Link</span>
            <span class="btnSpinner" hidden aria-hidden="true"></span>
          </button>

          <div class="errorBox" id="forgotError" hidden></div>
          <div class="successBox" id="forgotSuccess" hidden></div>

          <div class="formFooter">
            <a class="link" href="login.html">Back to login</a>
          </div>
        </form>
      </section>
    </div>
  </main>

  <div id="toastRoot" class="toastRoot" aria-live="polite" aria-atomic="true"></div>
  <div id="modalRoot" class="modalRoot" aria-hidden="true"></div>
</body>
</html>
