[build]
  publish = "."
  command = "echo 'Static build: no build step needed'"

# Allow Netlify to serve SPA-style routes (even though we mostly use separate HTML pages).
[[redirects]]
  from = "/"
  to = "/index.html"
  status = 200

[[redirects]]
  from = "/login"
  to = "/login.html"
  status = 200

[[redirects]]
  from = "/signup"
  to = "/signup.html"
  status = 200

[[redirects]]
  from = "/forgot-password"
  to = "/forgot-password.html"
  status = 200

[[redirects]]
  from = "/reset-password"
  to = "/reset-password.html"
  status = 200

[[redirects]]
  from = "/dashboard"
  to = "/dashboard.html"
  status = 200

[[redirects]]
  from = "/admin"
  to = "/admin.html"
  status = 200

# Fallback for any other route to index.html (hash routing recommended).
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
  force = false

